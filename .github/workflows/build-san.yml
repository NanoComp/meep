name: Sanitizers

on:
  schedule:
    - cron:  "24 10 * * *"
  workflow_dispatch:

jobs:
  build:
    name: "Test C++ with ${{ matrix.name-suffix }}"
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name-suffix: "ASAN"
            sanitizer: "address"
            configure-options: ""
            debug-options: "-g1"
          - name-suffix: "UBSAN"
            sanitizer: "undefined"
            configure-options: "CC=clang CXX=clang++ LD=clang++"
            debug-options: "-gmlt"

    steps:
    - name: Cache apt packages
      uses: actions/cache@v5
      id: apt-cache
      with:
        path: ~/apt-cache
        key: apt-san-${{ runner.os }}-${{ hashFiles('.github/workflows/build-san.yml') }}

    - name: Restore cached apt sources
      if: steps.apt-cache.outputs.cache-hit == 'true'
      run: sudo dpkg -i ~/apt-cache/*.deb 2>/dev/null || true

    - name: Install Dependencies
      if: steps.apt-cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update -y
        sudo apt-get install -y autoconf automake clang libaec-dev libctl-dev \
          libfftw3-dev libgdsii-dev libgsl-dev libharminv-dev libhdf5-dev \
          libtool mpb mpb-dev
        mkdir -p ~/apt-cache
        cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

    - name: Check out repository
      uses: actions/checkout@v6
    - name: Autoreconf
      run: autoreconf -if
    - name: configure
      run: |
        ./configure \
          --with-hdf5 --without-mpi --without-python --without-scheme \
          --enable-shared --enable-maintainer-mode \
          CXXFLAGS="-fsanitize=${{ matrix.sanitizer }} ${{ matrix.debug-options }}" \
          LDFLAGS="-fsanitize=${{ matrix.sanitizer }}" \
          ${{ matrix.configure-options }}
    - name: make
      run: make -j$(nproc)
    - name: Run sanitizer
      run: make -j$(nproc) check
    - name: Archive test logs
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: ${{ matrix.name-suffix }}-log
        path: tests/test-suite.log
